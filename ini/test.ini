# Snowmix test ini file
system control port 9999
system geometry 1024 576 BGRA
system frame rate 25
system socket /tmp/mixer1

# Default feed
feed idle 0 1

# Set max places for all subsystems we test
maxplaces video feeds 16
maxplaces virtual feeds 32
maxplaces audio feeds 20
maxplaces audio mixers 20
maxplaces audio sinks 20
maxplaces texts 64
maxplaces images 16
