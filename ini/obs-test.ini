# Advanced test ini for Snowmix MCP integration tests
# Correct maxplaces keywords from controller.cpp set_maxplaces()
# CRITICAL: maxplaces must come BEFORE system geometry, because
# system geometry triggers CVideoFeeds creation which locks in the max.
system control port 9999

# Maxplaces — must be set BEFORE system geometry and feed commands
maxplaces strings 5000
maxplaces fonts 5000
maxplaces texts 5000
maxplaces images 5000
maxplaces imageplaces 5000
maxplaces video feeds 5000
maxplaces virtual feeds 5000
maxplaces audio feeds 20
maxplaces audio mixers 20
maxplaces audio sinks 20
maxplaces shapes 64
maxplaces shapeplaces 64

# Now safe to set geometry (creates CVideoFeeds with maxplaces=5000)
system geometry 1280 720 BGRA
system frame rate 24
system socket /home/rjodouin/.snowmix-sockets/mixer1

# Default feed (after maxplaces video feeds is set)
feed idle 0 1
feed alpha 0 1

# Stack feed 0 as background layer (enables mixing loop)
stack 0

# PreShow and Show must end with a loop statement
command create PreShow
  loop
command end
overlay pre PreShow
command create Show
  loop
command end
overlay finish Show
